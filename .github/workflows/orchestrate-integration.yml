name: Orchestrate Integration CI

on:
  repository_dispatch:
    types:
      - orchestrate-integration
  workflow_dispatch:
    inputs:
      ref_name:
        description: Branch to validate in both app repos
        required: true
        type: string

permissions:
  contents: read

jobs:
  route-peer:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    outputs:
      target_repo: ${{ steps.route.outputs.target_repo }}
      ref_name: ${{ github.event.client_payload.ref_name }}
      source_repo: ${{ github.event.client_payload.source_repo }}
      source_sha: ${{ github.event.client_payload.sha }}
    steps:
      - id: route
        shell: bash
        run: |
          case "${{ github.event.client_payload.source_repo }}" in
            PlacesBack)
              echo "target_repo=PlacesFront" >> "$GITHUB_OUTPUT"
              ;;
            PlacesFront)
              echo "target_repo=PlacesBack" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported source repository: ${{ github.event.client_payload.source_repo }}"
              exit 1
              ;;
          esac

  dispatch-peer:
    if: github.event_name == 'repository_dispatch'
    needs: route-peer
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch peer CI
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_CI_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          TARGET_REPO: ${{ needs.route-peer.outputs.target_repo }}
          REF_NAME: ${{ needs.route-peer.outputs.ref_name }}
          SOURCE_REPO: ${{ needs.route-peer.outputs.source_repo }}
          SOURCE_SHA: ${{ needs.route-peer.outputs.source_sha }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${REPO_OWNER}/${TARGET_REPO}/dispatches" \
            -d @- <<EOF
          {
            "event_type": "orchestrated-integration-ci",
            "client_payload": {
              "ref_name": "${REF_NAME}",
              "source_repo": "${SOURCE_REPO}",
              "source_sha": "${SOURCE_SHA}",
              "orchestrator_repo": "${{ github.repository }}",
              "orchestrator_run_id": "${{ github.run_id }}"
            }
          }
          EOF

  dispatch-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_repo:
          - PlacesBack
          - PlacesFront
    steps:
      - name: Dispatch CI
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_CI_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ inputs.ref_name }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          TARGET_REPO: ${{ matrix.target_repo }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${REPO_OWNER}/${TARGET_REPO}/dispatches" \
            -d @- <<EOF
          {
            "event_type": "orchestrated-integration-ci",
            "client_payload": {
              "ref_name": "${REF_NAME}",
              "source_repo": "${SOURCE_REPO}",
              "source_sha": "${SOURCE_SHA}",
              "orchestrator_repo": "${{ github.repository }}",
              "orchestrator_run_id": "${{ github.run_id }}"
            }
          }
          EOF
