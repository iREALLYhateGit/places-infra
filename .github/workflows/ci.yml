name: Combined CI

on:
  repository_dispatch:
    types: [frontend-pushed, backend-pushed]
  workflow_dispatch:

jobs:
  test-backend:
    name: test backend
    runs-on: ubuntu-latest
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab3
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "25"
          cache: gradle

      - name: give execute permissions
        run: chmod +x ./gradlew

      - name: run tests
        run: ./gradlew test

  build-backend:
    name: build backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab3
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "25"
          cache: gradle

      - name: give execute permissions
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew assemble
  
  test-frontend:
    name: test frontend
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab3
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: run unit tests
        run: npm test

  build-frontend:
    name: build frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab3
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: build
        run: npm run build

  docker-backend:
    name: docker backend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab3
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: shuasd/places-backend

  docker-frontend:
    name: docker frontend
    runs-on: ubuntu-latest
    needs: docker-backend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab3
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: shuasd/places-frontend
