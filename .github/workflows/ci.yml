name: General CI

on:
  workflow_dispatch:

jobs:
  test-backend:
    name: test backend
    runs-on: ubuntu-latest
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "25"
          cache: gradle

      - name: give execute permissions
        run: chmod +x ./gradlew

      - name: run tests
        run: ./gradlew test

  build-backend:
    name: build backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "25"
          cache: gradle

      - name: give execute permissions
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew assemble
  
  test-frontend:
    name: test frontend
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: run unit tests
        run: npm test

  build-frontend:
    name: build frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: build
        run: npm run build

  sonar-backend:
    name: sonarqube scan backend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "25"
          cache: gradle

      - name: give execute permissions
        run: chmod +x ./gradlew

      - name: run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: sonarqube scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: check quality gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sonar-frontend:
    name: sonarqube scan frontend
    runs-on: ubuntu-latest
    needs: sonar-backend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          fetch-depth: 0

      - name: set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install dependencies
        run: npm ci

      - name: run tests with coverage
        run: npm run test:coverage

      - name: sonarqube scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: check quality gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  
  docker-backend:
    name: docker backend
    runs-on: ubuntu-latest
    needs: sonar-frontend
    steps:
      - name: checkout backend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesBack
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: shuasd/places-backend:${{ github.sha }}

  docker-frontend:
    name: docker frontend
    runs-on: ubuntu-latest
    needs: docker-backend
    steps:
      - name: checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iREALLYhateGit/PlacesFront
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: shuasd/places-frontend:${{ github.sha }}

  update-manifests:
    name: update manifests
    runs-on: ubuntu-latest
    needs: docker-frontend
    steps:
      - name: checkout places-infra
        uses: actions/checkout@v4
        with:
          ref: labs/lab4
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}

      - name: update backend image tag
        run: |
          sed -i "s|shuasd/places-backend:.*|shuasd/places-backend:${{ github.sha }}|" lab4/k8s/backend-deployment.yaml

      - name: update frontend image tag
        run: |
          sed -i "s|shuasd/places-frontend:.*|shuasd/places-frontend:${{ github.sha }}|" lab4/k8s/frontend-deployment.yaml

      - name: commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lab4/k8s/backend-deployment.yaml lab4/k8s/frontend-deployment.yaml
          git commit -m "update images to ${{ github.sha }}"
          git push
